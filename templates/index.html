<!DOCTYPE html>
<html>

<head>
    <title>DPR Multi-Agent Reasoning</title>

    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <!DOCTYPE html>

    <html>

    <head>

        <title>DPR Multi-Agent Console</title>

        <link rel="stylesheet" href="/static/style.css">

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    </head>

    <body>

        <div class="app">

            <div class="header">
                Distributed Protocol for Reasoning
            </div>


            <div id="chat" class="chat"></div>



            <div class="control-panel">

                <button onclick="pause()">Pause</button>
                <button onclick="resume()">Resume</button>
                <button onclick="showInject()">Inject</button>

            </div>



            <div id="command-box" class="command-box hidden">

                <input id="command-input" placeholder="Enter human instruction...">

                <button onclick="submitCommand()">Send</button>

            </div>



            <div class="input-bar">

                <textarea id="question" placeholder="Ask something..."></textarea>

                <button id="start-btn" onclick="start()">Start</button>

            </div>

        </div>

        <script src="/static/app.js"></script>

    </body>

    </html>

</body>

</html>
